services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: hostel_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hostel_platform"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  db-init:
    build:
      context: ./server
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/hostel_platform
      REDIS_URL: redis://redis:6379
      JWT_SECRET: hostel-jwt-secret-change-in-prod-2026
      JWT_REFRESH_SECRET: hostel-refresh-secret-change-in-prod-2026
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      ANTHROPIC_API_KEY: sk-ant-your-key-here
      CLOUDINARY_CLOUD_NAME: your-cloud-name
      CLOUDINARY_API_KEY: your-api-key
      CLOUDINARY_API_SECRET: your-api-secret
      HASH_SALT: sau-hostel-anon-salt-2026
      HOSTEL_NAME: South Asian University Hostel
      PORT: 3001
      CLIENT_URL: http://localhost:5173
      NODE_ENV: development
    command: sh -c "npx prisma migrate deploy && npx prisma db seed"
    restart: "no"

  server:
    build:
      context: ./server
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/hostel_platform
      REDIS_URL: redis://redis:6379
      JWT_SECRET: hostel-jwt-secret-change-in-prod-2026
      JWT_REFRESH_SECRET: hostel-refresh-secret-change-in-prod-2026
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      ANTHROPIC_API_KEY: sk-ant-your-key-here
      CLOUDINARY_CLOUD_NAME: your-cloud-name
      CLOUDINARY_API_KEY: your-api-key
      CLOUDINARY_API_SECRET: your-api-secret
      HASH_SALT: sau-hostel-anon-salt-2026
      HOSTEL_NAME: South Asian University Hostel
      PORT: 3001
      CLIENT_URL: http://localhost:5173
      NODE_ENV: development
    ports:
      - "3001:3001"

  client:
    build:
      context: ./client
    depends_on:
      server:
        condition: service_started
    environment:
      VITE_API_URL: http://localhost:3001
      VITE_SOCKET_URL: http://localhost:3001
    ports:
      - "5173:5173"

volumes:
  postgres_data:
